{{ define "title" }}{{ .Title }} - {{ end }}

{{ define "main" }}
<header class="page-title">
  <h1 class="title">{{ .Title }}</h1>
</header>

<ul class="terms">
  {{ range .Data.Terms.Alphabetical }}
  <li>
    <h2 class="terms-title">
      <a href="{{ .Page.Permalink }}">{{ .Name }} ({{ .Count }})</a>
    </h2>
  </li>
  {{ end }}
</ul>
{{ end }}
